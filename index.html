<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sopa de Letras Interactiva - Proyecto Puente</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --brand-black: #111111;
            --brand-gold: #c5a059;
            --accent-blue: #1a73e8;
            --accent-green: #188038;
            --brand-gray-medium: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Roboto', sans-serif; background-color: #eef1f4; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Contenedor Responsivo */
        .viewport-wrapper { flex: 1; width: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .transform-scroller { position: absolute; transform-origin: center center; display: flex; align-items: center; justify-content: center; cursor: grab; }
        
        .board-container { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: inline-block; }
        #crucigrama-img { max-width: 90vw; height: auto; display: block; pointer-events: none; }
        #canvas-interactivo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Controles Flotantes */
        .floating-container { position: absolute; bottom: 30px; right: 20px; z-index: 500; display: flex; gap: 10px; }
        .btn-float { width: 65px; height: 65px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .btn-float span { font-size: 1.8rem; }
        .btn-float label { font-size: 0.6rem; font-weight: bold; }
        .btn-float.active-nav { background: var(--accent-blue); color: white; }
        .btn-float.active-mark { background: var(--accent-green); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="viewport-padre" class="viewport-wrapper">
        <div id="scroller-transformable" class="transform-scroller">
            <div id="board-wrapper" class="board-container hidden">
                <img id="crucigrama-img" src="" alt="Sopa de Letras">
                <canvas id="canvas-interactivo"></canvas>
            </div>
        </div>
    </div>

    <div id="controles-estudiante" class="floating-container">
        <button id="btn-nav" class="btn-float active-nav">
            <span class="material-symbols-outlined">pan_tool</span>
            <label>MOVER</label>
        </button>
        <button id="btn-mark" class="btn-float">
            <span class="material-symbols-outlined">edit</span>
            <label>MARCAR</label>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ... Configuración Firebase igual a la anterior ...
        const db = getFirestore(initializeApp({ /* tus credenciales */ }));
        
        let scale = 1, panX = 0, panY = 0, modo = "navegar";
        const viewport = document.getElementById('viewport-padre');
        const scroller = document.getElementById('scroller-transformable');
        const img = document.getElementById('crucigrama-img');
        const canvas = document.getElementById('canvas-interactivo');
        const ctx = canvas.getContext('2d');

        // Lógica de "Contain" (Ajustar imagen completa)
        function ajustarImagenAlCargar() {
            if (!img.naturalWidth) return;
            const ratio = Math.min(viewport.clientWidth / img.naturalWidth, viewport.clientHeight / img.naturalHeight) * 0.9;
            scale = ratio;
            panX = (viewport.clientWidth - (img.naturalWidth * scale)) / 2;
            panY = (viewport.clientHeight - (img.naturalHeight * scale)) / 2;
            actualizarTransform();
        }

        function actualizarTransform() {
            scroller.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        // Eventos de Navegación (Mover/Zoom)
        viewport.addEventListener('touchstart', (e) => {
            if (modo !== "navegar") return;
            // Lógica de paneo y pinch-zoom...
        }, { passive: true });

        // Eventos de Marcado (Dibujo)
        canvas.addEventListener('mousedown', (e) => {
            if (modo !== "marcar") return;
            // Dibujar localmente, enviar al terminar...
        });

        document.getElementById('btn-nav').onclick = () => {
            modo = "navegar";
            document.getElementById('btn-nav').classList.add('active-nav');
            document.getElementById('btn-mark').classList.remove('active-mark');
        };

        document.getElementById('btn-mark').onclick = () => {
            modo = "marcar";
            document.getElementById('btn-mark').classList.add('active-mark');
            document.getElementById('btn-nav').classList.remove('active-nav');
        };

        // Recalcular al girar o redimensionar
        window.addEventListener('resize', ajustarImagenAlCargar);
    </script>
</body>
</html>
