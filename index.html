<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Proyecto Puente</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --blue: #1a73e8; --green: #188038; --bg: #eef1f4; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: var(--bg); font-family: sans-serif; overflow: hidden; }
        
        #viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #canvas-wrapper { position: absolute; transform-origin: center center; cursor: grab; }
        #canvas-interactivo { position: absolute; top: 0; left: 0; pointer-events: none; }
        img { display: block; max-width: 90vw; height: auto; }
        
        .floating-ui { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .btn.active { background: var(--blue); color: white; }
        .btn.active-mark { background: var(--green); color: white; }
        #status-msg { position: absolute; top: 50%; width: 100%; text-align: center; color: #666; }
    </style>
</head>
<body>

    <div id="status-msg">Esperando contenido del profesor...</div>
    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="tablero-img" src="" alt="Juego">
            <canvas id="canvas-interactivo"></canvas>
        </div>
    </div>

    <div class="floating-ui">
        <button id="btn-nav" class="btn active"><span class="material-symbols-outlined">pan_tool</span></button>
        <button id="btn-mark" class="btn"><span class="material-symbols-outlined">edit</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyBQdvDBqezHmwzYy5fXEi7M8sB8gzcFPKU",
            projectId: "sistema-profe-puente"
        }));

        const img = document.getElementById('tablero-img');
        const canvas = document.getElementById('canvas-interactivo');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        let scale = 1, modo = 'navegar';

        // 1. ESCUCHA DE DATOS (EL MOTOR DEL ESTUDIANTE)
        onSnapshot(doc(db, "salas_crucigramas", "DEFAULT"), (docSnap) => {
            if (!docSnap.exists() || !docSnap.data().imagenBase64) return;
            
            const data = docSnap.data();
            document.getElementById('status-msg').style.display = 'none';
            
            if (img.src !== data.imagenBase64) {
                img.src = data.imagenBase64;
                img.onload = () => {
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    ajustarImagenAlViewport();
                    renderTrazos(data.trazos || []);
                };
            } else {
                renderTrazos(data.trazos || []);
            }
        });

        function ajustarImagenAlViewport() {
            const vW = window.innerWidth * 0.9;
            const vH = window.innerHeight * 0.9;
            scale = Math.min(vW / img.naturalWidth, vH / img.naturalHeight);
            wrapper.style.transform = `scale(${scale})`;
        }

        function renderTrazos(trazos) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            trazos.forEach(t => {
                ctx.beginPath();
                ctx.strokeStyle = t.color;
                ctx.lineWidth = 15;
                t.puntos.forEach((p, i) => i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height));
                ctx.stroke();
            });
        }

        // 2. CAMBIO DE MODO
        document.getElementById('btn-nav').onclick = (e) => { 
            modo = 'navegar'; 
            e.currentTarget.classList.add('active'); 
            document.getElementById('btn-mark').classList.remove('active-mark');
        };
        document.getElementById('btn-mark').onclick = (e) => { 
            modo = 'marcar'; 
            e.currentTarget.classList.add('active-mark'); 
            document.getElementById('btn-nav').classList.remove('active');
        };
    </script>
</body>
</html>
